<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>Flow Field — Generative Art</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #06080f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  canvas { display: block; }
  #info {
    position: fixed;
    bottom: 24px;
    left: 24px;
    color: rgba(255, 255, 255, 0.55);
    font-size: 12px;
    line-height: 1.8;
    pointer-events: none;
    user-select: none;
    letter-spacing: 0.02em;
  }
  kbd {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    padding: 2px 7px;
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.85);
  }
  #palette-name {
    position: fixed;
    top: 24px;
    left: 24px;
    color: rgba(255, 255, 255, 0.4);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div id="palette-name">Aurora</div>
<div id="info">
  <kbd>R</kbd> regenerate &nbsp;&nbsp; <kbd>C</kbd> color &nbsp;&nbsp; <kbd>Space</kbd> pause &nbsp;&nbsp; <kbd>S</kbd> save
</div>
<script>
let particles = [];
let cols, rows;
const scale = 16;
const inc   = 0.08;
let zoff    = 0;
let flowfield;
let paused = false;
let paletteIdx = 0;

const palettes = [
  { name: 'Aurora',   hueRange: [160, 290], sat: 70, bri: 95,  wrap: false },
  { name: 'Sunset',   hueRange: [340, 60],  sat: 85, bri: 100, wrap: true  },
  { name: 'Spectrum', hueRange: [0, 360],   sat: 75, bri: 95,  wrap: false },
  { name: 'Ember',    hueRange: [0, 45],    sat: 90, bri: 100, wrap: false },
  { name: 'Mono',     hueRange: [210, 230], sat: 8,  bri: 100, wrap: false }
];

const BG = [225, 50, 4];

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 100);
  cols = floor(width / scale) + 1;
  rows = floor(height / scale) + 1;
  flowfield = new Array(cols * rows);
  background(...BG);
  initParticles();
}

function initParticles() {
  particles = [];
  const count = floor(constrain(width * height / 600, 1500, 4000));
  for (let i = 0; i < count; i++) particles.push(new Particle());
}

function draw() {
  if (paused) return;
  noStroke();
  fill(BG[0], BG[1], BG[2], 5);
  rect(0, 0, width, height);

  let yoff = 0;
  for (let y = 0; y < rows; y++) {
    let xoff = 0;
    for (let x = 0; x < cols; x++) {
      const angle = noise(xoff, yoff, zoff) * TWO_PI * 3;
      const v = p5.Vector.fromAngle(angle);
      v.setMag(0.4);
      flowfield[x + y * cols] = v;
      xoff += inc;
    }
    yoff += inc;
  }
  zoff += 0.002;

  for (const p of particles) {
    p.follow(flowfield);
    p.update();
    p.edges();
    p.show();
  }
}

function keyPressed() {
  if (key === 'r' || key === 'R') {
    noiseSeed(millis());
    background(...BG);
    initParticles();
  } else if (key === 'c' || key === 'C') {
    paletteIdx = (paletteIdx + 1) % palettes.length;
    document.getElementById('palette-name').textContent = palettes[paletteIdx].name;
    for (const p of particles) p.assignColor();
    background(...BG);
  } else if (key === ' ') {
    paused = !paused;
  } else if (key === 's' || key === 'S') {
    saveCanvas('flowfield', 'png');
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / scale) + 1;
  rows = floor(height / scale) + 1;
  flowfield = new Array(cols * rows);
  background(...BG);
  initParticles();
}

class Particle {
  constructor() {
    this.pos = createVector(random(width), random(height));
    this.vel = createVector(0, 0);
    this.acc = createVector(0, 0);
    this.maxSpeed = 2.2;
    this.prevPos = this.pos.copy();
    this.assignColor();
  }
  assignColor() {
    const pal = palettes[paletteIdx];
    if (pal.wrap) {
      const span = (360 - pal.hueRange[0]) + pal.hueRange[1];
      let h = pal.hueRange[0] + random(span);
      if (h >= 360) h -= 360;
      this.hue = h;
    } else {
      this.hue = random(pal.hueRange[0], pal.hueRange[1]);
    }
    this.sat = constrain(pal.sat + random(-10, 10), 0, 100);
    this.bri = constrain(pal.bri + random(-20, 0), 30, 100);
  }
  follow(vectors) {
    const x = constrain(floor(this.pos.x / scale), 0, cols - 1);
    const y = constrain(floor(this.pos.y / scale), 0, rows - 1);
    const force = vectors[x + y * cols];
    if (force) this.acc.add(force);
  }
  update() {
    this.vel.add(this.acc);
    this.vel.limit(this.maxSpeed);
    this.pos.add(this.vel);
    this.acc.mult(0);
  }
  show() {
    stroke(this.hue, this.sat, this.bri, 22);
    strokeWeight(1);
    line(this.pos.x, this.pos.y, this.prevPos.x, this.prevPos.y);
    this.updatePrev();
  }
  updatePrev() {
    this.prevPos.x = this.pos.x;
    this.prevPos.y = this.pos.y;
  }
  edges() {
    let wrapped = false;
    if (this.pos.x > width)  { this.pos.x = 0;      wrapped = true; }
    if (this.pos.x < 0)      { this.pos.x = width;  wrapped = true; }
    if (this.pos.y > height) { this.pos.y = 0;      wrapped = true; }
    if (this.pos.y < 0)      { this.pos.y = height; wrapped = true; }
    if (wrapped) this.updatePrev();
  }
}
</script>
</body>
</html>
