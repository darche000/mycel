  .card{background:#0e1015;border:1px solid var(--line);border-radius:8px;overflow:hidden;

  .card:hover{transform:translateY(-3px);border-color:rgba(124,242,201,0.4);
    box-shadow:0 16px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(124,242,201,0.2)}

  .thumb iframe{width:100%;height:100%;border:0;pointer-events:none}
  .thumb .overlay{position:absolute;inset:0;display:flex;align-items:flex-end;
    background:linear-gradient(180deg,transparent 60%,rgba(0,0,0,0.7));padding:14px;
    font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:0.1em;opacity:0;transition:opacity .2s}
  .card:hover .thumb .overlay{opacity:1}
  .meta{padding:14px 16px}
  .meta h3{margin:0 0 4px;font-size:14px;font-weight:500}
  .meta .tags{color:var(--mut);font-size:11px}

  .chip{padding:6px 12px;border:1px solid var(--line);border-radius:20px;font-size:11px;cursor:pointer;
    color:var(--mut);background:transparent;font-family:inherit}
  .chip.active{border-color:var(--acc);color:var(--acc);background:rgba(124,242,201,0.08)}

    header{position:static;align-items:flex-start;flex-direction:column;gap:16px;padding:28px 18px 18px}
    .nav a{display:inline-block;margin:0 8px 8px 0}
    section.hero{padding:28px 18px}

    .grid{grid-template-columns:1fr}

<body>

<script>

      {type:'Noise',x:30,y:130,p:{scale:0.02,octaves:3,seed:99,animate:0.005,contrast:1.5}},

/* ---------------- encode + render -------------------------------------- */
const textEncoder = new TextEncoder();

function bytesToBase64Url(bytes){
  let bin='';
  const chunk=0x8000;
  for(let i=0;i<bytes.length;i+=chunk){
    bin += String.fromCharCode(...bytes.subarray(i, i+chunk));
  }
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

async function encodeGraph(obj){
  const json=JSON.stringify(obj);
  if(typeof CompressionStream==='undefined'){
    return 'j.'+bytesToBase64Url(textEncoder.encode(json));
  }
  const cs=new CompressionStream('gzip');
  const w=cs.writable.getWriter();
  w.write(textEncoder.encode(json)); w.close();
  const buf=await new Response(cs.readable).arrayBuffer();
  return 'g.'+bytesToBase64Url(new Uint8Array(buf));
}

async function renderCard(item){
  const enc=await encodeGraph({nodes:item.graph.nodes.map((n,i)=>({...n,id:i+1})),
    wires:item.graph.wires.map(w=>({from:w[0]+1,to:w[1]+1,toPort:w[2]||0}))});
  const url=`index.html?embed=1&res=320#${enc}`;
  const studioUrl=`index.html#${enc}`;
  const a=document.createElement('a');
  a.className='card'; a.href=studioUrl;
  a.innerHTML=`
    <div class="thumb">
      <iframe src="${url}" loading="lazy"></iframe>
      <div class="overlay">click to remix →</div>
    </div>
    <div class="meta">
      <h3>${item.name}</h3>
      <div class="tags">${item.tags.join(' · ')}</div>
    </div>`;
  return a;
}

/* ---------------- filtering ------------------------------------------- */
const tagSet=new Set(['all']);
ITEMS.forEach(i=>i.tags.forEach(t=>tagSet.add(t)));
const filterEl=document.getElementById('filter');
const gridEl=document.getElementById('grid');
let active='all';

function renderFilters(){
  filterEl.innerHTML='';
  [...tagSet].forEach(t=>{
    const b=document.createElement('button');
    b.className='chip'+(t===active?' active':'');
    b.textContent=t;
    b.onclick=()=>{active=t; renderFilters(); renderGrid();};
    filterEl.appendChild(b);
  });
}
async function renderGrid(){
  gridEl.innerHTML='';
  const items=ITEMS.filter(i=>active==='all'||i.tags.includes(active));
  for(const it of items){
    gridEl.appendChild(await renderCard(it));
  }
}
renderFilters(); renderGrid();
</script>
</body>
